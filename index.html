<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>林傑墨</title>
<style>
  * { box-sizing: border-box; }
  body {
    margin: 0;
    font-family: -apple-system, BlinkMacSystemFont, "PingFang TC", "Microsoft JhengHei", sans-serif;
    background: #fdf6f2;
    height: 100vh;
    display: flex;
    flex-direction: column;
  }
  #setup {
    max-width: 420px;
    margin: 60px auto;
    background: white;
    padding: 28px;
    border-radius: 16px;
    box-shadow: 0 4px 20px rgba(0,0,0,0.06);
  }
  #setup h2 { margin-top: 0; color: #b5563a; font-size: 18px; }
  #setup input {
    width: 100%;
    padding: 10px 12px;
    margin: 8px 0 16px;
    border: 1px solid #eadfd8;
    border-radius: 8px;
    font-size: 14px;
  }
  #setup button, #send-btn {
    background: #d97757;
    color: white;
    border: none;
    padding: 10px 18px;
    border-radius: 8px;
    font-size: 14px;
    cursor: pointer;
  }
  #setup button:hover, #send-btn:hover { background: #c2643f; }

  header {
    background: white;
    padding: 14px 20px;
    border-bottom: 1px solid #eee1da;
    font-weight: 600;
    color: #4b3a34;
    display: flex;
    justify-content: space-between;
    align-items: center;
  }
  header span.status { font-size: 12px; color: #9c9c9c; font-weight: 400; }

  #chat {
    flex: 1;
    overflow-y: auto;
    padding: 20px;
    display: flex;
    flex-direction: column;
    gap: 14px;
  }
  .msg {
    max-width: 72%;
    padding: 10px 14px;
    border-radius: 14px;
    font-size: 15px;
    line-height: 1.6;
    white-space: pre-wrap;
    word-break: break-word;
  }
  .msg.user {
    align-self: flex-end;
    background: #d97757;
    color: white;
    border-bottom-right-radius: 4px;
  }
  .msg.assistant {
    align-self: flex-start;
    background: white;
    color: #333;
    border: 1px solid #eee1da;
    border-bottom-left-radius: 4px;
  }
  .msg.system {
    align-self: center;
    color: #b0342c;
    font-size: 13px;
    background: #fdecea;
    padding: 6px 12px;
  }

  #input-bar {
    display: flex;
    gap: 8px;
    padding: 14px 20px;
    background: white;
    border-top: 1px solid #eee1da;
  }
  #input-bar input {
    flex: 1;
    padding: 10px 14px;
    border-radius: 20px;
    border: 1px solid #eadfd8;
    font-size: 15px;
    outline: none;
  }
  #input-bar input:focus { border-color: #d97757; }

  .hidden { display: none !important; }
</style>
</head>
<body>

<div id="setup">
  <h2>連接後端</h2>
  <label>Railway 網址</label>
  <input id="base-url" placeholder="https://your-app.up.railway.app" />
  <button onclick="startChat()">開始聊天</button>
</div>

<div id="chat-screen" class="hidden" style="display:flex; flex-direction:column; height:100vh;">
  <header>
    林傑墨
    <span class="status" id="status-text">已連接</span>
  </header>
  <div id="chat"></div>
  <div id="input-bar">
    <input id="msg-input" placeholder="說點什麼..." onkeydown="if(event.key==='Enter') sendMessage()" />
    <button id="send-btn" onclick="sendMessage()">送出</button>
  </div>
</div>

<script>
let BASE_URL = "";
let history = [];
const FRONTEND_KEY = "Peachy123"; // 跟 Railway 環境變數 FRONTEND_ACCESS_KEY 要一致

function startChat() {
  const url = document.getElementById("base-url").value.trim().replace(/\/$/, "");
  if (!url) { alert("請輸入後端網址"); return; }
  BASE_URL = url;
  document.getElementById("setup").classList.add("hidden");
  document.getElementById("chat-screen").classList.remove("hidden");
  document.getElementById("msg-input").focus();
}

function appendMsg(role, text) {
  const chat = document.getElementById("chat");
  const div = document.createElement("div");
  div.className = "msg " + role;
  div.textContent = text;
  chat.appendChild(div);
  chat.scrollTop = chat.scrollHeight;
  return div;
}

async function sendMessage() {
  const input = document.getElementById("msg-input");
  const text = input.value.trim();
  if (!text) return;
  input.value = "";

  appendMsg("user", text);
  history.push({ role: "user", content: text });

  const statusEl = document.getElementById("status-text");
  statusEl.textContent = "思考中...";

  const assistantDiv = appendMsg("assistant", "");
  let fullText = "";

  try {
    const res = await fetch(BASE_URL + "/v1/chat/completions", {
      method: "POST",
      headers: {
        "Content-Type": "application/json",
        "Authorization": "Bearer " + FRONTEND_KEY
      },
      body: JSON.stringify({
        model: "gpt-4o",
        messages: history,
        stream: true
      })
    });

    if (!res.ok) {
      const errText = await res.text();
      assistantDiv.remove();
      appendMsg("system", "錯誤：" + res.status + " " + errText.slice(0, 200));
      statusEl.textContent = "連接失敗";
      return;
    }

    const reader = res.body.getReader();
    const decoder = new TextDecoder();
    let buffer = "";

    while (true) {
      const { done, value } = await reader.read();
      if (done) break;
      buffer += decoder.decode(value, { stream: true });
      const lines = buffer.split("\n");
      buffer = lines.pop();

      for (const line of lines) {
        const trimmed = line.trim();
        if (!trimmed.startsWith("data: ")) continue;
        const payload = trimmed.slice(6);
        if (payload === "[DONE]") continue;
        try {
          const json = JSON.parse(payload);
          const delta = json.choices?.[0]?.delta?.content;
          if (delta) {
            fullText += delta;
            assistantDiv.textContent = fullText;
            document.getElementById("chat").scrollTop = document.getElementById("chat").scrollHeight;
          }
        } catch (e) { /* skip malformed chunk */ }
      }
    }

    if (fullText) {
      history.push({ role: "assistant", content: fullText });
    } else {
      assistantDiv.textContent = "（沒有收到回覆，請檢查後端 log）";
    }
    statusEl.textContent = "已連接";

  } catch (err) {
    assistantDiv.remove();
    appendMsg("system", "連線失敗：" + err.message);
    statusEl.textContent = "連接失敗";
  }
}
</script>

</body>
</html>
